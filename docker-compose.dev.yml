services:
  goderpad-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: goderpad-backend
    ports:
      - "7778:7778"
    volumes:
      - ./past:/app/past

  goderpad-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: goderpad-frontend
    ports:
      - "7777:7777"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - goderpad-backend
    environment:
      - VITE_API_URL=http://localhost:7778
      - VITE_WS_URL=ws://localhost:7778
    
  goderpad-nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf
    depends_on:
      - goderpad-backend
      - goderpad-frontend
    ports:
      - 3001:80
