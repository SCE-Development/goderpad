services:
  goderpad-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goderpad-backend
    volumes:
      - ./past:/app/past

  goderpad-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${BACKEND_URL}
        - VITE_WS_URL=${WS_URL}
        - VITE_API_KEY=${API_KEY}
    container_name: goderpad-frontend
    depends_on:
      - goderpad-backend
  
  goderpad-nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - goderpad-backend
      - goderpad-frontend

networks:
  default:
    external:
      name: sce
