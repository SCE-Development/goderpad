services:
  goderpad-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goderpad-backend
    ports:
      - "7778:7778"
    volumes:
      - ./past:/app/past

  goderpad-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${BACKEND_URL}
        - VITE_WS_URL=${WS_URL}
        - VITE_API_KEY=${API_KEY}
    container_name: goderpad-frontend
    ports:
      - "7777:7777"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - goderpad-backend
  
  goderpad-nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - goderpad-backend
      - goderpad-frontend

networks:
  default:
    external:
      name: sce